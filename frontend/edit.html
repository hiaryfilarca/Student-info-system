{% extends "base.html" %}

{% block content %}
<div class="header-section">
    <h1>Edit Student</h1>
    <p>Update student details for ID: {{ student.student_id }}</p>
</div>

<div class="card bg-glass form-section" style="max-width: 600px; margin: 0 auto;">
    <form method="POST" action="{{ url_for('main.edit_student', id=student.id) }}">
        <div class="form-group">
            <label for="student_id">Student ID (Read-only)</label>
            <input type="text" id="student_id" value="{{ student.student_id }}" disabled style="opacity: 0.7;">
        </div>
        <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" required value="{{ student.name }}">
        </div>
        <div class="form-group">
            <label for="course">Course/Major</label>
            <input type="text" id="course" name="course" required value="{{ student.course }}">
        </div>
        <div style="display: flex; gap: 1rem;">
            <button type="submit" class="btn-primary full-width">Save Changes</button>
            <a href="{{ url_for('main.students') }}" class="btn-primary full-width" style="background: rgba(255,255,255,0.1); text-align: center;">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
