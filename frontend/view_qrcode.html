{% extends "base.html" %}

{% block content %}
<div class="header-section text-center">
    <h1>Student QR Code</h1>
    <p>{{ student.name }} ({{ student.course }})</p>
</div>

<div class="card bg-glass qr-section" style="max-width: 400px; margin: 0 auto; padding: 2rem; display: flex; flex-direction: column; align-items: center;">
    <div class="qr-container text-center">
        <img src="data:image/png;base64,{{ qr_code }}" class="qr-image" alt="QR Code" style="width: 250px; background: white; padding: 10px; border-radius: 8px;">
        <p class="hint" style="margin-top: 1rem; color: #cbd5e1;">Right-click and save this image.</p>
    </div>
    
    <div style="margin-top: 2rem; width: 100%;">
        <a href="{{ url_for('main.students') }}" class="btn-primary full-width text-center" style="box-sizing: border-box; text-decoration: none; display: block;">Back to Students List</a>
    </div>
</div>
{% endblock %}
