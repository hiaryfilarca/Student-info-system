{% extends "base.html" %}

{% block content %}
<div class="header-section text-center">
    <h1>Scan QR Code</h1>
    <p>Point the camera at the student's QR code to record attendance.</p>
</div>

<div class="scanner-container">
    <div class="card bg-glass scanner-card">
        <div id="reader" width="600px"></div>
        <div id="result-message" class="alert" style="display: none; margin-top: 20px;"></div>
    </div>
</div>

<script src="{{ url_for('static', filename='js/main.js') }}"></script>
{% endblock %}
